<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFNetworking — Example Page</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1d2b64, #f8cdda);
      color: #1a1a1a;
    }
    .card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(8px);
      max-width: 640px;
      margin: 2rem;
      padding: 2.5rem 3rem;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25);
    }
    h1 { margin-top: 0; font-size: 2rem; }
    code {
      background: #f0f0f3;
      padding: 0.15em 0.4em;
      border-radius: 6px;
      font-size: 0.9em;
    }
    .badge {
      display: inline-block;
      background: #2ea44f;
      color: #fff;
      font-size: 0.8rem;
      padding: 0.2em 0.7em;
      border-radius: 999px;
      margin-bottom: 1rem;
    }
    footer { margin-top: 2rem; font-size: 0.85rem; color: #555; }
    a { color: #1d2b64; }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">GitHub Pages · live</span>
    <h1>👋 Hello from AFNetworking</h1>
    <p>
      This is an example page served by <strong>GitHub Pages</strong> from the
      <code>emremct/AFNetworking</code> repository.
    </p>
    <p>
      It lives in the <code>docs/</code> folder on the <code>master</code> branch and is
      published automatically on every push.
    </p>
    <footer>
      Built as a step-by-step GitHub Pages demo ·
      <a href="https://github.com/emremct/AFNetworking">view the repo</a>
    </footer>
  </main>
</body>
</html>
